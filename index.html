<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="board-header">
        <h1>Pro Kanban</h1>
        <form id="task-form">
            <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" required>
            <button type="submit">Add Task</button>
        </form>
    </div>

    <div class="board">
        <div class="lane">
            <h3 class="heading todo-heading">To Do</h3>
            <div class="task-zone" id="todo-lane"></div>
        </div>

        <div class="lane">
            <h3 class="heading doing-heading">In Progress</h3>
            <div class="task-zone" id="doing-lane"></div>
        </div>

        <div class="lane">
            <h3 class="heading done-heading">Done</h3>
            <div class="task-zone" id="done-lane"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
